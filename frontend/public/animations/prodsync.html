<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .stage {
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 2rem;
    min-height: 380px;
    font-family: 'Montserrat', sans-serif;
  }

  /* status pulse */
  @keyframes pulse-g {

    0%,
    100% {
      box-shadow: 0 0 0 0 rgba(34, 197, 94, .55);
    }

    65% {
      box-shadow: 0 0 0 7px rgba(34, 197, 94, 0);
    }
  }

  @keyframes pulse-r {

    0%,
    100% {
      box-shadow: 0 0 0 0 rgba(239, 68, 68, .55);
    }

    65% {
      box-shadow: 0 0 0 7px rgba(239, 68, 68, 0);
    }
  }

  /* belt */
  @keyframes belt {
    from {
      stroke-dashoffset: 0;
    }

    to {
      stroke-dashoffset: -32;
    }
  }

  /* product slide */
  @keyframes prod {
    0% {
      transform: translateX(0);
      opacity: 0;
    }

    6% {
      opacity: 1;
    }

    88% {
      opacity: 1;
    }

    100% {
      transform: translateX(192px);
      opacity: 0;
    }
  }

  /* data dots on wire */
  @keyframes dot-flow {
    0% {
      offset-distance: 0%;
      opacity: 0;
    }

    8% {
      opacity: 1;
    }

    90% {
      opacity: 1;
    }

    100% {
      offset-distance: 100%;
      opacity: 0;
    }
  }

  /* bar chart bars */
  @keyframes bar-up {
    from {
      transform: scaleY(0);
    }

    to {
      transform: scaleY(1);
    }
  }

  /* line chart draw */
  @keyframes line-draw {
    from {
      stroke-dashoffset: 300;
    }

    to {
      stroke-dashoffset: 0;
    }
  }

  /* fade in */
  @keyframes fi {
    from {
      opacity: 0;
      transform: translateY(5px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .d1 {
    animation: dot-flow 2.2s ease-in-out infinite 0s;
  }

  .d2 {
    animation: dot-flow 2.2s ease-in-out infinite .7s;
  }

  .d3 {
    animation: dot-flow 2.2s ease-in-out infinite 1.4s;
  }

  .belt {
    stroke-dasharray: 16 16;
    animation: belt 1s linear infinite;
  }

  .pr1 {
    animation: prod 2.8s ease-in-out infinite 0s;
  }

  .pr2 {
    animation: prod 2.8s ease-in-out infinite .95s;
  }

  .pr3 {
    animation: prod 2.8s ease-in-out infinite 1.9s;
  }

  .sg {
    animation: pulse-g 2s ease-in-out infinite;
  }

  .sr {
    animation: pulse-r 1.1s ease-in-out infinite;
  }

  .b1 {
    transform-origin: bottom;
    animation: bar-up 1s cubic-bezier(.22, 1, .36, 1) .3s both;
  }

  .b2 {
    transform-origin: bottom;
    animation: bar-up 1s cubic-bezier(.22, 1, .36, 1) .5s both;
  }

  .b3 {
    transform-origin: bottom;
    animation: bar-up 1s cubic-bezier(.22, 1, .36, 1) .7s both;
  }

  .b4 {
    transform-origin: bottom;
    animation: bar-up 1s cubic-bezier(.22, 1, .36, 1) .9s both;
  }

  .lc {
    stroke-dasharray: 300;
    animation: line-draw 1.8s ease .5s both;
  }

  .fi {
    animation: fi .8s ease .2s both;
  }
</style>
